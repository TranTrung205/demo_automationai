name: SauceDemoLogin
description: Login with standard user and verify inventory page loads

page: SauceDemoLogin

steps:

  - id: open_site
    type: goto
    url: https://www.saucedemo.com

  - id: fill_username
    type: action
    target: username
    value: standard_user

  - id: fill_password
    type: action
    target: password
    value: secret_sauce

  - id: click_login
    type: action
    target: loginButton

  - id: verify_inventory
    type: assert
    target: inventoryList