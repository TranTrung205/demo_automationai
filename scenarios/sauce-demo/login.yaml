name: SauceDemo Login
description: Login with standard user and verify inventory page loads

steps:

  - id: open_site
    action: goto
    target: https://www.saucedemo.com

  - id: fill_username
    action: fill
    target: "#user-name"
    value: standard_user

  - id: fill_password
    action: fill
    target: "#password"
    value: secret_sauce

  - id: click_login
    action: click
    target: "#login-button"
    waitForNavigation: true

  - id: verify_inventory
    action: assertVisible
    target: ".inventory_list"