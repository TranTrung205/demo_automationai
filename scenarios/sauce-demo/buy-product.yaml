name: Buy Product
description: Login and add product to cart then verify cart page

steps:

  - id: open_site
    description: Open SauceDemo website
    action: goto
    target:
      name: site
      locator: "https://www.saucedemo.com"

  - id: login_username
    description: Enter username
    action: fill
    target:
      name: username
      locator: "#user-name"
    value: standard_user

  - id: login_password
    description: Enter password
    action: fill
    target:
      name: password
      locator: "#password"
    value: secret_sauce

  - id: login_click
    description: Click login button
    action: click
    target:
      name: loginButton
      locator: "#login-button"

  - id: add_product
    description: Add first product to cart
    action: click
    target:
      name: addToCartButton
      locator: ".inventory_item button"

  - id: open_cart
    description: Open cart page
    action: click
    target:
      name: cartLink
      locator: ".shopping_cart_link"

  - id: verify_cart
    description: Verify cart page is visible
    action: assert
    target:
      name: cartList
      locator: ".cart_list"
    expected: visible